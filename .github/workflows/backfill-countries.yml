name: Backfill Country Codes (one-time)

on:
  workflow_dispatch:   # Manual trigger only — run once then delete/disable

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "pulse360-bot"
          git config user.email "pulse360-bot@users.noreply.github.com"

      - name: Run backfill script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/backfill_countries.py

      - name: Commit updated articles
        id: commit
        run: |
          git add -A src/content/news/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            TAGGED=$(git diff --cached --name-only | wc -l)
            git commit -m "chore(content): backfill country codes on ${TAGGED} articles"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: steps.commit.outputs.changed == 'true'
        run: |
          git pull --rebase origin main
          git push
